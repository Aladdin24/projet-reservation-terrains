<!-- owner/templates/owner/dashboard.html -->
{% extends 'owner/base.html' %}

{% block content %}
<h2>Tableau de bord</h2>
<div class="row">
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ terrains_count }}</h5>
                <p class="card-text">Terrains gérés</p>
                <a href="{% url 'owner:terrain_list' %}" class="btn btn-primary">Gérer mes terrains et créneaux</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ reservations_count }}</h5>
                <p class="card-text">Réservations reçues</p>
                <a href="{% url 'owner:reservation_list' %}" class="btn btn-primary">Voir</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ gains|floatformat:2 }} MRU</h5>
                <p class="card-text">Gains totaux</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
